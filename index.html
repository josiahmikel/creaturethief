<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>creaturethief</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, 'Inter', Helvetica, sans-serif;
            background: white;
        }
        
        .top-left-image {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 160px;
            height: auto;
            pointer-events: none;
            transition: filter 0.3s ease;
            z-index: 10;
        }
        .top-left-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        .top-left-image.blurred {
            filter: blur(4px);
        }
        
        .pouch {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 160px;
            height: 160px;
            background-image: url('assets/pouch.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            z-index: 20;
        }
        .pouch:hover {
            transform: scale(1.03);
            filter: drop-shadow(0 0 12px rgba(255,215,0,0.5));
        }
        .pouch.highlight {
            transform: scale(1.05);
            filter: drop-shadow(0 0 16px rgba(255,215,0,0.7));
        }
        
        /* Sprites container - on top visually, but lets clicks pass through */
        .sprites-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
        }
        .sprite {
            position: absolute;
            width: 64px;
            height: 64px;
            background-image: url('assets/mp3-sprite.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: grab;
            will-change: left, top;
            pointer-events: auto;
        }
        .sprite:active {
            cursor: grabbing;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s;
        }
        .modal.open {
            opacity: 1;
            visibility: visible;
        }
        .window {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            border-radius: 28px;
            width: auto;
            min-width: 340px;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
            border: 3px solid #b87c2e;
        }
        .window::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 2px dashed rgba(255,235,150,0.7);
            border-radius: 20px;
            pointer-events: none;
        }
        .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            background: rgba(0,0,0,0.4);
            border: none;
            color: #ffd966;
            font-size: 20px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        .close-btn:hover {
            background: rgba(0,0,0,0.7);
        }
        .window-content {
            padding: 28px 24px;
            overflow-y: auto;
            flex: 1;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .cd-player {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 28px;
            border: 2px solid rgba(255,215,0,0.5);
            width: 100%;
            max-width: 360px;
        }
        .player-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .cd-spin {
            font-size: 48px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
        }
        .cd-spin.playing {
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .now-playing {
            font-size: 14px;
            font-weight: 600;
            color: #2c1a0c;
            background: rgba(255,255,200,0.9);
            padding: 6px 14px;
            border-radius: 40px;
            text-align: center;
            word-break: break-word;
        }
        .player-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            color: #ffd966;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
            font-family: monospace;
        }
        .ctrl-btn:hover {
            background: rgba(0,0,0,0.7);
            transform: scale(1.02);
        }
        .dropzone {
            border: 2px dashed rgba(255,215,0,0.8);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.1s;
            cursor: grab;
            text-align: center;
        }
        .dropzone.drag-over {
            background: rgba(255,215,0,0.4);
            border-color: #ffed4e;
        }
        .dropzone .now-playing {
            display: inline-block;
            margin-top: 0;
        }
        .player-hint {
            font-size: 10px;
            margin-top: 10px;
            opacity: 0.7;
            text-align: center;
            color: #2c1a0c;
        }
        
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            justify-items: center;
            margin-top: 0;
            width: 100%;
            max-width: 360px;
        }
        .inventory-slot {
            width: 90px;
            height: 90px;
            background: rgba(0,0,0,0.25);
            border-radius: 18px;
            border: 2px solid rgba(255,215,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.1s;
        }
        .inventory-slot.drag-over {
            background: rgba(255,215,0,0.5);
            transform: scale(1.02);
        }
        .slot-item {
            width: 70px;
            height: 70px;
            background-image: url('assets/mp3-sprite.png');
            background-size: contain;
            background-repeat: no-repeat;
            cursor: grab;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
        }
        .slot-item:active {
            cursor: grabbing;
        }
        .slot-label {
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 8px;
            font-weight: 800;
            background: rgba(0,0,0,0.7);
            color: #ffd966;
            padding: 2px 6px;
            border-radius: 20px;
        }
        .empty-slot {
            width: 70px;
            height: 70px;
            background: rgba(0,0,0,0.2);
            border-radius: 14px;
            border: 1px dashed rgba(255,215,0,0.5);
        }
        .empty-message {
            text-align: center;
            color: #2c1a0c;
            font-weight: 500;
            padding: 40px 20px;
            background: rgba(0,0,0,0.15);
            border-radius: 20px;
            width: 100%;
        }
        
        .toast {
            position: fixed;
            bottom: 190px;
            right: 40px;
            background: rgba(0,0,0,0.85);
            color: #ffd966;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 20000;
            animation: fadeOut 2s forwards;
            pointer-events: none;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-10px); visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="top-left-image" id="topLeftImage">
    <img src="assets/dontdoit.jpg" alt="">
</div>

<div class="pouch" id="pouch"></div>

<div class="sprites-container" id="spritesContainer"></div>

<div class="modal" id="inventoryModal">
    <div class="window">
        <button class="close-btn" id="closeModalBtn">✕</button>
        <div class="window-content" id="modalContent"></div>
    </div>
</div>

<script>
    const SPRITE_SIZE = 64;
    const INITIAL_COUNT = 5;
    const MAX_SLOTS = 9;
    
    const spritesContainer = document.getElementById('spritesContainer');
    const pouch = document.getElementById('pouch');
    const modal = document.getElementById('inventoryModal');
    const modalContent = document.getElementById('modalContent');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const topLeftImage = document.getElementById('topLeftImage');
    
    let sprites = [];
    let inventory = new Array(MAX_SLOTS).fill(null);
    let nextId = 1;
    let activeSprite = null;
    let dragStart = { x: 0, y: 0, left: 0, top: 0 };
    let isDragging = false;
    let draggedInventoryIndex = null;
    
    let currentAudio = null;
    let currentTrackItem = null;
    let isPlaying = false;
    
    const songs = [
        { name: "Follow", duration: "3:45", url: "assets/follow.mp3" },
        { name: "Redi", duration: "4:12", url: "assets/redi.mp3" },
        { name: "148", duration: "3:58", url: "assets/148.mp3" },
        { name: "118", duration: "4:30", url: "assets/118.mp3" },
        { name: "Eurovision", duration: "3:22", url: "assets/eurovision.mp3" }
    ];
    
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function getPouchRect() { return pouch.getBoundingClientRect(); }
    
    function getTopLeftImageRect() {
        return topLeftImage.getBoundingClientRect();
    }
    
    function isOverlap(rect1, rect2) {
        return !(rect2.left > rect1.right ||
                 rect2.right < rect1.left ||
                 rect2.top > rect1.bottom ||
                 rect2.bottom < rect1.top);
    }
    
    function getRandomSafePosition() {
        const maxX = window.innerWidth - SPRITE_SIZE;
        const maxY = window.innerHeight - SPRITE_SIZE;
        const pouchRect = getPouchRect();
        const imageRect = getTopLeftImageRect();
        let attempts = 0;
        const maxAttempts = 100;
        
        while (attempts < maxAttempts) {
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            const spriteRect = { left: x, right: x + SPRITE_SIZE, top: y, bottom: y + SPRITE_SIZE };
            if (!isOverlap(spriteRect, pouchRect) && !isOverlap(spriteRect, imageRect)) {
                return { x, y };
            }
            attempts++;
        }
        // fallback: try to place at (10,10) – unlikely to overlap
        return { x: 10, y: 10 };
    }
    
    function ejectTrack() {
        if (currentTrackItem) {
            const emptySlot = inventory.findIndex(slot => slot === null);
            if (emptySlot !== -1) {
                inventory[emptySlot] = currentTrackItem;
            } else {
                return;
            }
        }
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        currentTrackItem = null;
        isPlaying = false;
        renderInventory();
    }
    
    function playTrack(trackItem) {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        try {
            const audio = new Audio(trackItem.url);
            audio.play().catch(e => {});
            currentAudio = audio;
            currentTrackItem = trackItem;
            isPlaying = true;
            audio.addEventListener('ended', () => {
                isPlaying = false;
                currentAudio = null;
                renderInventory();
            });
            renderInventory();
        } catch(e) {}
    }
    
    function pauseTrack() {
        if (currentAudio && isPlaying) {
            currentAudio.pause();
            isPlaying = false;
            renderInventory();
        } else if (currentAudio && !isPlaying) {
            currentAudio.play();
            isPlaying = true;
            renderInventory();
        }
    }
    
    function downloadTrack() {
        if (currentTrackItem) {
            const link = document.createElement('a');
            link.href = currentTrackItem.url;
            link.download = `${currentTrackItem.name.replace(/\s/g, '_')}.mp3`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }
    
    function renderInventory() {
        const filledCount = inventory.filter(i => i !== null).length;
        
        if (filledCount === 0 && !currentTrackItem) {
            modalContent.innerHTML = `<div class="empty-message">You haven't stolen any tracks yet.</div>`;
            return;
        }
        
        let playerHtml = '';
        if (currentTrackItem) {
            playerHtml = `
                <div class="cd-player">
                    <div class="player-row">
                        <div class="cd-spin ${isPlaying ? 'playing' : ''}">💿</div>
                        <div class="now-playing">${currentTrackItem.name}</div>
                    </div>
                    <div class="player-controls">
                        <button class="ctrl-btn" id="pauseBtn">${isPlaying ? 'pause' : 'resume'}</button>
                        <button class="ctrl-btn" id="downloadBtn">download</button>
                        <button class="ctrl-btn" id="ejectBtn">eject</button>
                    </div>
                </div>
            `;
        } else {
            playerHtml = `
                <div class="cd-player">
                    <div class="dropzone" id="playerDropzone">
                        <div class="now-playing">drop track here to listen</div>
                    </div>
                </div>
            `;
        }
        
        let gridHtml = `<div class="inventory-grid" id="inventoryGrid">`;
        for (let i = 0; i < MAX_SLOTS; i++) {
            if (inventory[i]) {
                const item = inventory[i];
                gridHtml += `
                    <div class="inventory-slot" data-slot-index="${i}">
                        <div class="slot-item" draggable="true" data-item-id="${item.id}" data-slot-index="${i}">
                            <div class="slot-label">${item.name.substring(0, 6)}</div>
                        </div>
                    </div>
                `;
            } else {
                gridHtml += `<div class="inventory-slot" data-slot-index="${i}"><div class="empty-slot"></div></div>`;
            }
        }
        gridHtml += `</div>`;
        
        modalContent.innerHTML = `<div style="display: flex; flex-direction: column; align-items: center; width: 100%;">${playerHtml}${gridHtml}</div>`;
        
        if (currentTrackItem) {
            const pauseBtn = document.getElementById('pauseBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const ejectBtn = document.getElementById('ejectBtn');
            if (pauseBtn) pauseBtn.addEventListener('click', pauseTrack);
            if (downloadBtn) downloadBtn.addEventListener('click', downloadTrack);
            if (ejectBtn) ejectBtn.addEventListener('click', ejectTrack);
        } else {
            setupPlayerDropzone();
        }
        
        const slots = document.querySelectorAll('.inventory-slot');
        slots.forEach(slot => {
            slot.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                slot.classList.add('drag-over');
            });
            slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                const targetIdx = parseInt(slot.getAttribute('data-slot-index'));
                handleInventoryDrop(targetIdx);
            });
        });
        
        const items = document.querySelectorAll('.slot-item');
        items.forEach(item => {
            item.addEventListener('dragstart', (e) => {
                const slotIdx = parseInt(item.getAttribute('data-slot-index'));
                draggedInventoryIndex = slotIdx;
                e.dataTransfer.setData('text/plain', inventory[slotIdx]?.id);
                e.dataTransfer.effectAllowed = 'move';
                item.style.opacity = '0.5';
            });
            item.addEventListener('dragend', () => {
                item.style.opacity = '';
                draggedInventoryIndex = null;
                document.querySelectorAll('.inventory-slot').forEach(s => s.classList.remove('drag-over'));
            });
            item.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                const slotIdx = parseInt(item.getAttribute('data-slot-index'));
                const trackItem = inventory[slotIdx];
                if (trackItem) {
                    inventory[slotIdx] = null;
                    playTrack(trackItem);
                }
            });
        });
    }
    
    function setupPlayerDropzone() {
        const dropzone = document.getElementById('playerDropzone');
        if (!dropzone) return;
        
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            dropzone.classList.add('drag-over');
        });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-over');
            if (draggedInventoryIndex !== null && inventory[draggedInventoryIndex]) {
                const trackItem = inventory[draggedInventoryIndex];
                inventory[draggedInventoryIndex] = null;
                playTrack(trackItem);
                draggedInventoryIndex = null;
            }
        });
    }
    
    function handleInventoryDrop(targetIdx) {
        if (draggedInventoryIndex !== null && draggedInventoryIndex !== targetIdx) {
            const sourceItem = inventory[draggedInventoryIndex];
            const targetItem = inventory[targetIdx];
            if (sourceItem) {
                if (targetItem === null) {
                    inventory[targetIdx] = sourceItem;
                    inventory[draggedInventoryIndex] = null;
                } else {
                    inventory[draggedInventoryIndex] = targetItem;
                    inventory[targetIdx] = sourceItem;
                }
                renderInventory();
            }
        }
        draggedInventoryIndex = null;
    }
    
    function addToPouch(sprite) {
        const spriteRect = sprite.getBoundingClientRect();
        const pouchRect = getPouchRect();
        
        if (spriteRect.right > pouchRect.left && spriteRect.left < pouchRect.right &&
            spriteRect.bottom > pouchRect.top && spriteRect.top < pouchRect.bottom) {
            const songIdx = parseInt(sprite.getAttribute('data-song-idx'));
            if (!isNaN(songIdx)) {
                const emptySlot = inventory.findIndex(slot => slot === null);
                if (emptySlot !== -1) {
                    const song = songs[songIdx % songs.length];
                    inventory[emptySlot] = { id: nextId++, name: song.name, duration: song.duration, url: song.url, songIdx: songIdx };
                    showToast(`stole: ${song.name}`);
                    if (modal.classList.contains('open')) renderInventory();
                    return true;
                }
            }
        }
        return false;
    }
    
    function clampSprite(sprite) {
        let left = parseFloat(sprite.style.left), top = parseFloat(sprite.style.top);
        let maxX = window.innerWidth - SPRITE_SIZE, maxY = window.innerHeight - SPRITE_SIZE;
        sprite.style.left = Math.min(Math.max(0, left), maxX) + 'px';
        sprite.style.top = Math.min(Math.max(0, top), maxY) + 'px';
    }
    
    function onPointerDown(e) {
        activeSprite = e.target.closest('.sprite');
        if (!activeSprite) return;
        e.preventDefault();
        dragStart.left = parseFloat(activeSprite.style.left);
        dragStart.top = parseFloat(activeSprite.style.top);
        dragStart.x = e.clientX;
        dragStart.y = e.clientY;
        isDragging = true;
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
        activeSprite.setPointerCapture(e.pointerId);
    }
    
    function onPointerMove(e) {
        if (!activeSprite || !isDragging) return;
        e.preventDefault();
        let newLeft = dragStart.left + (e.clientX - dragStart.x);
        let newTop = dragStart.top + (e.clientY - dragStart.y);
        let maxX = window.innerWidth - SPRITE_SIZE;
        let maxY = window.innerHeight - SPRITE_SIZE;
        activeSprite.style.left = Math.min(Math.max(0, newLeft), maxX) + 'px';
        activeSprite.style.top = Math.min(Math.max(0, newTop), maxY) + 'px';
        
        const r1 = activeSprite.getBoundingClientRect();
        const r2 = getPouchRect();
        pouch.classList.toggle('highlight', r1.right > r2.left && r1.left < r2.right && r1.bottom > r2.top && r1.top < r2.bottom);
    }
    
    function onPointerUp(e) {
        if (!activeSprite) return;
        const added = addToPouch(activeSprite);
        if (!added) {
            clampSprite(activeSprite);
        } else {
            activeSprite.remove();
            sprites = sprites.filter(s => s !== activeSprite);
        }
        pouch.classList.remove('highlight');
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', onPointerUp);
        if (activeSprite.releasePointerCapture) activeSprite.releasePointerCapture(e.pointerId);
        activeSprite = null;
        isDragging = false;
    }
    
    function createSprite(songIdx) {
        const div = document.createElement('div');
        div.className = 'sprite';
        div.setAttribute('data-song-idx', songIdx);
        const { x, y } = getRandomSafePosition();
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.addEventListener('pointerdown', onPointerDown);
        div.addEventListener('dragstart', e => e.preventDefault());
        div.style.touchAction = 'none';
        spritesContainer.appendChild(div);
        return div;
    }
    
    function openModal() { 
        renderInventory(); 
        modal.classList.add('open');
        topLeftImage.classList.add('blurred');
    }
    function closeModal() { 
        modal.classList.remove('open');
        topLeftImage.classList.remove('blurred');
    }
    
    for (let i = 0; i < INITIAL_COUNT; i++) sprites.push(createSprite(i % songs.length));
    
    pouch.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    window.addEventListener('resize', () => sprites.forEach(clampSprite));
</script>
</body>
</html>
