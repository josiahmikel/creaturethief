<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>creaturethief</title><style>*{user-select:none;-webkit-tap-highlight-color:transparent;box-sizing:border-box}body{margin:0;width:100vw;height:100vh;overflow:hidden;position:fixed;font-family:Helvetica,Arial,sans-serif;background:#fff}.top-left-image{position:fixed;top:20px;left:20px;width:160px;pointer-events:auto;cursor:pointer;transition:filter .3s;z-index:10}.top-left-image img{width:100%;display:block}.top-left-image.blurred{filter:blur(4px)}.pouch{position:fixed;bottom:30px;right:30px;width:160px;height:160px;background:url('assets/pouch.png')center/contain no-repeat;cursor:pointer;transition:transform .2s,filter .2s;z-index:20}.pouch:hover{transform:scale(1.03);filter:drop-shadow(0 0 12px #ffd70080)}.pouch.highlight{transform:scale(1.05);filter:drop-shadow(0 0 16px #ffd700b3)}.sprites-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:30;touch-action:none}.sprite{position:absolute;width:64px;height:64px;background:url('assets/mp3-sprite.png')center/contain no-repeat;cursor:grab;pointer-events:auto}.sprite:active{cursor:grabbing}.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0006;backdrop-filter:blur(12px);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .2s}.modal.open{opacity:1;visibility:visible}.window{background:linear-gradient(135deg,#d4af37,#b8860b);border-radius:28px;width:auto;min-width:340px;max-width:90vw;display:flex;flex-direction:column;box-shadow:0 25px 50px -12px #000;border:3px solid #b87c2e;position:relative}.window::before{content:'';position:absolute;top:10px;left:10px;right:10px;bottom:10px;border:2px dashed #ffeb9670;border-radius:20px;pointer-events:none}.close-btn{position:absolute;top:16px;right:20px;background:#0006;border:none;color:#ffd966;font-size:20px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(4px)}.close-btn:hover{background:#000b}.window-content{padding:28px 24px;flex:1;display:flex;flex-direction:column;align-items:center;overflow:hidden}.cd-player{background:#0004;border-radius:24px;padding:20px;margin-bottom:28px;border:2px solid #ffd70080;width:100%;max-width:360px}.player-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}.cd-spin{font-size:48px;filter:drop-shadow(0 2px 6px #0004)}.cd-spin.playing{animation:spin 1.2s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.now-playing{font-size:14px;font-weight:600;color:#2c1a0c;background:#ffffcc;padding:6px 14px;border-radius:40px;text-align:center}.player-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.ctrl-btn{background:#0008;border:none;color:#ffd966;padding:5px 16px;border-radius:40px;font-size:11px;font-weight:600;cursor:pointer;font-family:monospace}.ctrl-btn:hover{background:#000c;transform:scale(1.02)}.dropzone{border:2px dashed #ffd700cc;border-radius:20px;padding:20px;text-align:center;cursor:grab}.dropzone.drag-over{background:#ffd70066;border-color:#ffed4e}.inventory-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;justify-items:center;width:100%;max-width:360px}.inventory-slot{width:90px;height:90px;background:#0004;border-radius:18px;border:2px solid #ffd700cc;display:flex;align-items:center;justify-content:center;position:relative;transition:all .1s}.inventory-slot.drag-over{background:#ffd70080;transform:scale(1.02)}.slot-item{width:70px;height:70px;background:url('assets/mp3-sprite.png')center/contain no-repeat;cursor:grab;filter:drop-shadow(0 2px 6px #0004);touch-action:none;position:relative}.slot-item:active{cursor:grabbing}.slot-label{position:absolute;bottom:6px;right:8px;font-size:8px;font-weight:800;background:#000b;color:#ffd966;padding:2px 6px;border-radius:20px}.empty-slot{width:70px;height:70px;background:#0003;border-radius:14px;border:1px dashed #ffd70080}.empty-message{text-align:center;color:#2c1a0c;font-weight:500;padding:40px 20px;background:#0003;border-radius:20px;width:100%}.toast{position:fixed;bottom:190px;right:40px;background:#000d;color:#ffd966;padding:8px 18px;border-radius:40px;font-size:12px;z-index:20000;animation:fadeOut 2s forwards;pointer-events:none}@keyframes fadeOut{to{opacity:0;transform:translateY(-10px);visibility:hidden}}.drag-clone{position:fixed;width:64px;height:64px;background:url('assets/mp3-sprite.png')center/contain no-repeat;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));opacity:.8;pointer-events:none;z-index:20001;transform:translate(-50%,-50%)}.sprite.ejecting{transition:left .5s cubic-bezier(0.2,0.9,0.4,1.1),top .5s cubic-bezier(0.2,0.9,0.4,1.1),transform .3s ease-out}</style></head><body><div class="top-left-image" id="topLeftImage"><img src="assets/dontdoit.jpg" alt=""></div><div class="pouch" id="pouch"></div><div class="sprites-container" id="spritesContainer"></div><div class="modal" id="inventoryModal"><div class="window"><button class="close-btn" id="closeModalBtn">✕</button><div class="window-content" id="modalContent"></div></div></div><script>const SPRITE_SIZE=64,INITIAL_COUNT=5,MAX_SLOTS=9;const spritesContainer=document.getElementById('spritesContainer'),pouch=document.getElementById('pouch'),modal=document.getElementById('inventoryModal'),modalContent=document.getElementById('modalContent'),closeModalBtn=document.getElementById('closeModalBtn'),topLeftImage=document.getElementById('topLeftImage');let sprites=[],inventory=Array(MAX_SLOTS).fill(null),nextId=1,draggingSprite=null,dragStart={x:0,y:0,left:0,top:0},draggingInventoryItem=null,inventoryDragMoved=!1,currentAudio=null,currentPlayingTrack=null,currentPlayingSlot=-1;const songs=[{name:"Follow",url:"assets/follow.mp3"},{name:"Redi",url:"assets/redi.mp3"},{name:"148",url:"assets/148.mp3"},{name:"118",url:"assets/118.mp3"},{name:"Eurovision",url:"assets/eurovision.mp3"}];function showToast(m){let t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2000)}function getRect(e){return e.getBoundingClientRect()}function getPouchRect(){return getRect(pouch)}function getImageRect(){return getRect(topLeftImage)}function overlap(a,b){return!(b.left>a.right||b.right<a.left||b.top>a.bottom||b.bottom<a.top)}function getRandomSafePosition(){let maxX=innerWidth-SPRITE_SIZE,maxY=innerHeight-SPRITE_SIZE,pr=getPouchRect(),ir=getImageRect();for(let i=0;i<100;i++){let x=Math.random()*maxX,y=Math.random()*maxY,r={left:x,right:x+SPRITE_SIZE,top:y,bottom:y+SPRITE_SIZE};if(!overlap(r,pr)&&!overlap(r,ir))return{x,y}}return{x:10,y:10}}function getNextPlayingSlot(a){for(let i=1;i<=MAX_SLOTS;i++){let idx=(a+i)%MAX_SLOTS;if(inventory[idx]!==null)return idx}return-1}function findEmptySlot(){for(let i=0;i<MAX_SLOTS;i++)if(inventory[i]===null)return i;return-1}function returnTrackToGrid(t){let e=findEmptySlot();if(e!==-1){inventory[e]=t;renderInventory()}else{let p=getRandomSafePosition(),d=document.createElement('div');d.className='sprite';d.setAttribute('data-song-idx',t.songIdx);d.style.left=p.x+'px';d.style.top=p.y+'px';d.addEventListener('pointerdown',onSpritePointerDown);d.addEventListener('dragstart',e=>e.preventDefault());d.style.touchAction='none';spritesContainer.appendChild(d);sprites.push(d);showToast(`inventory full — ${t.name} returned to playground`)}}function playTrackFromSlot(i){if(i===-1||!inventory[i])return!1;let t=inventory[i];inventory[i]=null;currentPlayingTrack=t;currentPlayingSlot=i;if(currentAudio){currentAudio.pause();currentAudio=null}try{let a=new Audio(t.url);a.play().catch(()=>{});currentAudio=a;a.onended=()=>{if(currentPlayingTrack)returnTrackToGrid(currentPlayingTrack);currentPlayingTrack=null;currentPlayingSlot=-1;currentAudio=null;let n=getNextPlayingSlot(i);n!==-1?playTrackFromSlot(n):renderInventory()};renderInventory();return!0}catch(e){inventory[i]=t;currentPlayingTrack=null;currentPlayingSlot=-1;renderInventory();return!1}}function ejectCurrentTrack(){if(currentPlayingTrack&&currentAudio){currentAudio.pause();currentAudio=null;let t=currentPlayingTrack;currentPlayingTrack=null;currentPlayingSlot=-1;returnTrackToGrid(t)}}function stopPlayback(){if(currentAudio){currentAudio.pause();currentAudio=null}currentPlayingTrack=null;currentPlayingSlot=-1}function addToInventory(t){let e=findEmptySlot();if(e!==-1){inventory[e]=t;renderInventory();return!0}return!1}function removeFromInventory(i){if(i>=0&&i<MAX_SLOTS&&inventory[i]){inventory[i]=null;renderInventory();return!0}return!1}function swapInventorySlots(a,b){let t=inventory[a];inventory[a]=inventory[b];inventory[b]=t;renderInventory()}function createEjectedSprite(i,s,e){let d=document.createElement('div');d.className='sprite ejecting';d.setAttribute('data-song-idx',i.songIdx);let sl=s.left+s.width/2-SPRITE_SIZE/2,st=s.top+s.height/2-SPRITE_SIZE/2;d.style.left=sl+'px';d.style.top=st+'px';d.style.transform='scale(0.3)';d.style.opacity='0.8';spritesContainer.appendChild(d);sprites.push(d);d.addEventListener('pointerdown',onSpritePointerDown);d.addEventListener('dragstart',e=>e.preventDefault());d.style.touchAction='none';d.offsetHeight;d.style.left=e.x+'px';d.style.top=e.y+'px';d.style.transform='scale(1)';d.style.opacity='1';let r=()=>{d.classList.remove('ejecting');d.style.transition='';d.removeEventListener('transitionend',r)};d.addEventListener('transitionend',r)}function ejectAllFromPouch(){let c=inventory.filter(i=>i!==null);if(c.length===0)return;let s=getPouchRect();for(let i=0;i<c.length;i++){let p=getRandomSafePosition();createEjectedSprite(c[i],s,p)}inventory.fill(null);stopPlayback();renderInventory();showToast(`returned ${c.length} track${c.length!==1?'s':''}`)}function addToPouch(s){let r1=getRect(s),r2=getPouchRect();if(r1.right>r2.left&&r1.left<r2.right&&r1.bottom>r2.top&&r1.top<r2.bottom){let si=parseInt(s.getAttribute('data-song-idx'));if(!isNaN(si)){let t={id:nextId++,name:songs[si%songs.length].name,url:songs[si%songs.length].url,songIdx:si};if(addToInventory(t)){showToast(`stole: ${t.name}`);return!0}}}return!1}function clampSprite(s){let l=parseFloat(s.style.left),t=parseFloat(s.style.top),mx=innerWidth-SPRITE_SIZE,my=innerHeight-SPRITE_SIZE;s.style.left=Math.min(Math.max(0,l),mx)+'px';s.style.top=Math.min(Math.max(0,t),my)+'px'}function onSpritePointerDown(e){let s=e.target.closest('.sprite');if(!s)return;e.preventDefault();draggingSprite=s;dragStart.left=parseFloat(s.style.left);dragStart.top=parseFloat(s.style.top);dragStart.x=e.clientX;dragStart.y=e.clientY;window.addEventListener('pointermove',onSpritePointerMove);window.addEventListener('pointerup',onSpritePointerUp);s.setPointerCapture(e.pointerId)}function onSpritePointerMove(e){if(!draggingSprite)return;e.preventDefault();let nl=dragStart.left+(e.clientX-dragStart.x),nt=dragStart.top+(e.clientY-dragStart.y),mx=innerWidth-SPRITE_SIZE,my=innerHeight-SPRITE_SIZE;draggingSprite.style.left=Math.min(Math.max(0,nl),mx)+'px';draggingSprite.style.top=Math.min(Math.max(0,nt),my)+'px';let r1=getRect(draggingSprite),r2=getPouchRect();pouch.classList.toggle('highlight',r1.right>r2.left&&r1.left<r2.right&&r1.bottom>r2.top&&r1.top<r2.bottom)}function onSpritePointerUp(e){if(!draggingSprite)return;let a=addToPouch(draggingSprite);if(!a)clampSprite(draggingSprite);else{draggingSprite.remove();sprites=sprites.filter(s=>s!==draggingSprite)}pouch.classList.remove('highlight');window.removeEventListener('pointermove',onSpritePointerMove);window.removeEventListener('pointerup',onSpritePointerUp);if(draggingSprite.releasePointerCapture)draggingSprite.releasePointerCapture(e.pointerId);draggingSprite=null}function onInventoryPointerDown(e){let t=e.target.closest('.slot-item');if(!t)return;e.preventDefault();e.stopPropagation();let i=parseInt(t.getAttribute('data-slot-index')),it=inventory[i];if(!it)return;let c=document.createElement('div');c.className='drag-clone';c.style.width='64px';c.style.height='64px';c.style.backgroundImage="url('assets/mp3-sprite.png')";c.style.backgroundSize='contain';c.style.backgroundRepeat='no-repeat';document.body.appendChild(c);let r=t.getBoundingClientRect();c.style.left=(r.left+r.width/2)+'px';c.style.top=(r.top+r.height/2)+'px';draggingInventoryItem={slotIdx:i,item:it,startX:e.clientX,startY:e.clientY,clone:c,targetRect:r};inventoryDragMoved=!1;t.style.opacity='0.5';window.addEventListener('pointermove',onInventoryPointerMove);window.addEventListener('pointerup',onInventoryPointerUp);t.setPointerCapture(e.pointerId)}function onInventoryPointerMove(e){if(!draggingInventoryItem)return;e.preventDefault();let dx=Math.abs(e.clientX-draggingInventoryItem.startX),dy=Math.abs(e.clientY-draggingInventoryItem.startY);if(dx>5||dy>5)inventoryDragMoved=!0;if(draggingInventoryItem.clone){draggingInventoryItem.clone.style.left=e.clientX+'px';draggingInventoryItem.clone.style.top=e.clientY+'px'}}function onInventoryPointerUp(e){if(!draggingInventoryItem)return;if(draggingInventoryItem.clone)draggingInventoryItem.clone.remove();let te=document.elementsFromPoint(e.clientX,e.clientY)[0],dz=te.closest('.dropzone'),is=te.closest('.inventory-slot');if(!inventoryDragMoved)playTrackFromSlot(draggingInventoryItem.slotIdx);else{if(dz&&dz.id==='playerDropzone')playTrackFromSlot(draggingInventoryItem.slotIdx);else if(is){let ti=parseInt(is.getAttribute('data-slot-index'));if(ti!==draggingInventoryItem.slotIdx)swapInventorySlots(draggingInventoryItem.slotIdx,ti)}}let oi=document.querySelector(`.slot-item[data-slot-index="${draggingInventoryItem.slotIdx}"]`);if(oi)oi.style.opacity='';window.removeEventListener('pointermove',onInventoryPointerMove);window.removeEventListener('pointerup',onInventoryPointerUp);if(oi&&oi.releasePointerCapture)oi.releasePointerCapture(e.pointerId);draggingInventoryItem=null}function onInventoryDoubleClick(e){let t=e.target.closest('.slot-item');if(!t)return;let i=parseInt(t.getAttribute('data-slot-index'));playTrackFromSlot(i)}function renderInventory(){let fc=inventory.filter(i=>i!==null).length;if(fc===0&&!currentPlayingTrack){modalContent.innerHTML='<div class="empty-message">You haven\'t stolen any tracks yet.</div>';return}let ph='';if(currentPlayingTrack){ph=`<div class="cd-player"><div class="player-row"><div class="cd-spin playing">💿</div><div class="now-playing">${currentPlayingTrack.name}</div></div><div class="player-controls"><button class="ctrl-btn" id="pauseBtn">pause</button><button class="ctrl-btn" id="downloadBtn">download</button><button class="ctrl-btn" id="ejectBtn">eject</button></div></div>`}else{ph=`<div class="cd-player"><div class="dropzone" id="playerDropzone"><div class="now-playing">drop track here to listen</div></div></div>`}let gh='<div class="inventory-grid" id="inventoryGrid">';for(let i=0;i<MAX_SLOTS;i++){if(inventory[i]){let it=inventory[i];gh+=`<div class="inventory-slot" data-slot-index="${i}"><div class="slot-item" data-item-id="${it.id}" data-slot-index="${i}"><div class="slot-label">${it.name.substring(0,6)}</div></div></div>`}else{gh+=`<div class="inventory-slot" data-slot-index="${i}"><div class="empty-slot"></div></div>`}}gh+='</div>';modalContent.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;width:100%;">${ph}${gh}</div>`;if(currentPlayingTrack){let pb=document.getElementById('pauseBtn'),db=document.getElementById('downloadBtn'),eb=document.getElementById('ejectBtn'),cd=document.querySelector('.cd-spin');if(pb)pb.onclick=()=>{if(currentAudio&&!currentAudio.paused){currentAudio.pause();pb.textContent='resume';if(cd)cd.classList.remove('playing')}else if(currentAudio&&currentAudio.paused){currentAudio.play();pb.textContent='pause';if(cd)cd.classList.add('playing')}};if(db)db.onclick=()=>{if(currentPlayingTrack){let a=document.createElement('a');a.href=currentPlayingTrack.url;a.download=currentPlayingTrack.name.replace(/\s/g,'_')+'.mp3';a.click()}};if(eb)eb.onclick=ejectCurrentTrack}else{let dz=document.getElementById('playerDropzone');if(dz){dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag-over')};dz.ondragleave=()=>dz.classList.remove('drag-over');dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag-over');if(draggingInventoryItem)playTrackFromSlot(draggingInventoryItem.slotIdx)}}}document.querySelectorAll('.slot-item').forEach(el=>{el.addEventListener('pointerdown',onInventoryPointerDown);el.addEventListener('dblclick',onInventoryDoubleClick)})}function createSprite(i){let d=document.createElement('div');d.className='sprite';d.setAttribute('data-song-idx',i);let p=getRandomSafePosition();d.style.left=p.x+'px';d.style.top=p.y+'px';d.addEventListener('pointerdown',onSpritePointerDown);d.addEventListener('dragstart',e=>e.preventDefault());d.style.touchAction='none';spritesContainer.appendChild(d);return d}function openModal(){renderInventory();modal.classList.add('open');topLeftImage.classList.add('blurred')}function closeModal(){modal.classList.remove('open');topLeftImage.classList.remove('blurred')}for(let i=0;i<INITIAL_COUNT;i++)sprites.push(createSprite(i%songs.length));pouch.addEventListener('click',openModal);closeModalBtn.addEventListener('click',closeModal);modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});window.addEventListener('resize',()=>sprites.forEach(clampSprite));topLeftImage.addEventListener('click',ejectAllFromPouch);</script></body></html>
